<div class="wi-fc-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>WI Function Call</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <label class="checkbox_label" title="Enable or disable the WI Function Call extension">
                <span>Enable WI Function Call</span>
                <input id="wi_fc_enabled" type="checkbox" />
            </label>

            <div class="wi-fc-setting-row">
                <label for="wi_fc_max_entries">Max tool-callable entries</label>
                <input id="wi_fc_max_entries" type="number" min="1" max="100" class="text_pole wi-fc-number-input" />
            </div>

            <div class="wi-fc-setting-row wi-fc-setting-col">
                <label for="wi_fc_function_description">Function description prefix</label>
                <textarea id="wi_fc_function_description" class="text_pole" rows="3"></textarea>
            </div>
        </div>
    </div>
</div>
